name: "Hexesoft Inim"
description: "Bridge tra centrale Inim Prime PR500 e Home Assistant via MQTT."
version: "1.0.1"
slug: "hexesoft_inim"
arch:
  - aarch64
  - amd64
host_network: true
startup: application
boot: auto


options:
  inim:
    host: ""
    port: 6004
    password: ""
    pin: "0000"
    connectiontype: 2
    contactpollinterval: 5

  mqtt:
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    basetopic: "inim_bridge"
    discoveryprefix: "homeassistant"

  systemsettings:
    loglevel: "info"

schema:
  inim:
    host: str
    port: int
    password: password
    pin: str
    connectiontype: int
    contactpollinterval: int

  mqtt:
    host: str
    port: int
    username: str?
    password: password?
    basetopic: str
    discoveryprefix: str

  systemsettings:
    log_level: list(info|debug|warning|error)
