name: "Hexesoft Inim"
description: >
  Bridge TCP diretto tra la centrale Inim Prime PR500 e Home Assistant via MQTT.
  Scopre automaticamente le zone configurate e pubblica lo stato in tempo reale.
version: "1.0.1"
slug: "hexesoft_mitsubishi"
arch:
  - aarch64
  - amd64
init: false
map:
  - config:rw

options:
  inim:
    host: ""
    port: 6004
    password: ""
    pin: "0000"
    connectiontype: 2
    contactpollinterval: 5

  mqtt:
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    basetopic: "inim_bridge"
    discoveryprefix: "homeassistant"

  systemsettings:
    # Livello di log sulla console dell'add-on
    # "infon" = solo transizioni ON/OFF (uso normale)
    # "debug"       = dettaglio completo del protocollo (diagnosi problemi)
    loglevel: "info"

schema:
  inim:
    host: str
    port: int
    password: password
    pin: str
    connectiontype: int
    contactpollinterval: int

  mqtt:
    host: str
    port: int
    username: str?
    password: password?
    basetopic: str
    discoveryprefix: str

  systemsettings:
    # Livello log: solo i valori dell'elenco sono accettati
    loglevel:
      - "debug"
      - "info"
      - "warning"
      - "error"
